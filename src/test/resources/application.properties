# Test classpath entries shadow src/main/resources/application.properties entirely (Maven puts
# target/test-classes ahead of target/classes), so the real spring.data.mongodb.host/port from the
# main file never reaches the test JVM. That's deliberate: tests must stay on the isolated,
# ephemeral embedded MongoDB (de.flapdoodle.embed.mongo.spring30x, test-scope in pom.xml) and never
# touch the real local instance the running app now connects to.
de.flapdoodle.mongodb.embedded.version=7.0.14
spring.data.mongodb.auto-index-creation=true
