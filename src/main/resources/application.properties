# Preserve the original deployment's context path ("/kitchensink") so the REST API stays at
# the same URLs (e.g. /kitchensink/rest/members) that existing clients, including
# RemoteMemberRegistrationIT, already expect.
server.servlet.context-path=/kitchensink

# Connects to a real, locally installed MongoDB instance (default install/port - no auth).
# MongoConnectivityCheck (see the config package) pings this on startup and fails fast with a
# clear error if it can't be reached, rather than letting the driver hang or fail later mid-request.
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=kitchensink

# Only read when de.flapdoodle.embed.mongo.spring30x is on the classpath, which is test-scope
# only (see pom.xml) - picks the embedded MongoDB version used by the @DataMongoTest slice.
de.flapdoodle.mongodb.embedded.version=7.0.14

# Creates the @Indexed(unique = true) index on Member.email automatically, replacing the
# relational unique constraint that used to enforce this.
spring.data.mongodb.auto-index-creation=true
