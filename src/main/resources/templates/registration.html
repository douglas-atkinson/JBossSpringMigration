<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>kitchensink</title>
    <link rel="stylesheet" th:href="@{/css/screen.css}" />
</head>
<body>
<div id="container">
    <div id="content">
        <h1>Member Registration</h1>
        <p>Enforces annotation-based constraints defined on the model class.</p>

        <form th:action="@{/register}" th:object="${newMember}" method="post">
            <table>
                <tr>
                    <td><label for="name">Name:</label></td>
                    <td><input type="text" id="name" th:field="*{name}" /></td>
                    <td><span class="invalid" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span></td>
                </tr>
                <tr>
                    <td><label for="email">Email:</label></td>
                    <td><input type="text" id="email" th:field="*{email}" /></td>
                    <td><span class="invalid" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span></td>
                </tr>
                <tr>
                    <td><label for="phoneNumber">Phone #:</label></td>
                    <td><input type="text" id="phoneNumber" th:field="*{phoneNumber}" /></td>
                    <td><span class="invalid" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></span></td>
                </tr>
            </table>

            <p>
                <input type="submit" class="register" value="Register" />
                <span class="valid" th:if="${registeredMessage}" th:text="${registeredMessage}"></span>
            </p>
        </form>

        <h2>Members</h2>
        <p th:if="${#lists.isEmpty(members)}"><em>No registered members.</em></p>
        <table class="simpletablestyle" th:unless="${#lists.isEmpty(members)}">
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone #</th>
                    <th>REST URL</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="m : ${members}">
                    <td th:text="${m.id}"></td>
                    <td th:text="${m.name}"></td>
                    <td th:text="${m.email}"></td>
                    <td th:text="${m.phoneNumber}"></td>
                    <td><a th:href="@{/rest/members/{id}(id=${m.id})}" th:text="@{/rest/members/{id}(id=${m.id})}"></a></td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="5">
                        REST URL for all members:
                        <a th:href="@{/rest/members}" th:text="@{/rest/members}"></a>
                    </td>
                </tr>
            </tfoot>
        </table>
    </div>
    <div id="footer"></div>
</div>
</body>
</html>
