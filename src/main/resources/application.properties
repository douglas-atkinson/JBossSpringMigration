# Preserve the original deployment's context path ("/kitchensink") so the REST API stays at
# the same URLs (e.g. /kitchensink/rest/members) that existing clients, including
# RemoteMemberRegistrationIT, already expect.
server.servlet.context-path=/kitchensink

# Embedded, ephemeral MongoDB (de.flapdoodle.embed.mongo.spring30x) - matches the original
# kitchensink-quickstart-ds.xml's spirit of an in-memory dev/demo-only database, never a
# production datasource. No external Mongo installation or connection string needed; a real
# mongod binary is started automatically and torn down when the app stops.
spring.data.mongodb.database=kitchensink
de.flapdoodle.mongodb.embedded.version=7.0.14

# Creates the @Indexed(unique = true) index on Member.email automatically, replacing the
# relational unique constraint that used to enforce this.
spring.data.mongodb.auto-index-creation=true
