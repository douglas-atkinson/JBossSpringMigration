# Preserve the original deployment's context path ("/kitchensink") so the REST API stays at
# the same URLs (e.g. /kitchensink/rest/members) that existing clients, including
# RemoteMemberRegistrationIT, already expect.
server.servlet.context-path=/kitchensink

# In-memory H2 database - matches the original kitchensink-quickstart-ds.xml, which was always
# explicitly documented as dev/demo-only, never a production datasource.
spring.datasource.url=jdbc:h2:mem:kitchensink;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa

# Matches the original persistence.xml's hibernate.hbm2ddl.auto=create-drop; also triggers
# Hibernate's native import.sql loading (src/main/resources/import.sql) after schema creation.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
